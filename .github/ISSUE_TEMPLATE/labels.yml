# Two orthogonal axes: phase:* (Oxide RFD-5 style engineering phase) and layer:* (architecture).
# Board status lives in board columns, not in labels.

# --- Phase (RFD-5 engineering phases) ---
- name: "phase:scoping"
  color: "e8d9ff"
  description: "Determining the problem to be solved"
- name: "phase:exploration"
  color: "c4a7f5"
  description: "Investigating potential solutions"
- name: "phase:prototyping"
  color: "9a6dd7"
  description: "Throwaway artifacts to evaluate ideas"
- name: "phase:determination"
  color: "6f42c1"
  description: "Choosing a technical direction (ADR)"
- name: "phase:development"
  color: "0366d6"
  description: "Actively building"
- name: "phase:validation"
  color: "fbca04"
  description: "Confirming the artifact is correct"
- name: "phase:stress"
  color: "e36209"
  description: "Operating at load until it breaks"
- name: "phase:production"
  color: "2da44e"
  description: "Shipped / integrated bring-up"

# --- Layer (architectural component) ---
- name: "layer:abi-types"
  color: "bfdadc"
  description: "Shared ABI newtypes and manifest"
- name: "layer:frame-alloc"
  color: "0e7c86"
  description: "Physical frame allocator (memory spec 4.2)"
- name: "layer:vmem"
  color: "1b9aaa"
  description: "Page mapper / AddressSpace (4.3)"
- name: "layer:region"
  color: "3fb6b2"
  description: "Region, protection, attributes (4.4)"
- name: "layer:arena"
  color: "2188a6"
  description: "Bump arena / ELF heap (4.5)"
- name: "layer:constructor"
  color: "0a4f73"
  description: "Constructor primitive (7)"
- name: "layer:capability"
  color: "156f87"
  description: "Capability decode and validation (6)"
- name: "layer:lifecycle"
  color: "4a8fa8"
  description: "Teardown, fault, restart (8)"

# --- Meta ---
- name: "type:epic"
  color: "7b2d8e"
  description: "A development tracked across phases"
- name: "bug"
  color: "d73a4a"
  description: "Deviation from spec or expected behaviour"
- name: "decision-needed"
  color: "f9a825"
  description: "Open determination; ADR not yet resolved"
- name: "breaking-abi"
  color: "b60205"
  description: "Changes a shared ABI type or manifest shape"
- name: "forward-target"
  color: "cccccc"
  description: "Deferred by design (12)"
- name: "blocked"
  color: "e99695"
  description: "Cannot proceed until a dependency closes"
- name: "good-first-issue"
  color: "7057ff"
  description: "Self-contained, well-scoped entry point"
